# Linux/Mac
mkdir -p .github/workflows
cat > .github/workflows/build-exe.yml << 'EOF'
name: Build EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --add-data "logo_kant.png:." --version-file=version.txt info_go.py
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/info_go.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
EOF
